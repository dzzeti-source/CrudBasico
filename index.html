<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Código RA</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .btn-del { background: #dc3545; padding: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Alunos</h2>
    <input type="text" id="nome" placeholder="Nome do Aluno">
    <input type="number" id="ra" placeholder="RA do Aluno">
    <button onclick="salvar()">Gerar Código e Salvar</button>
</div>

<table id="tabelaAlunos">
    <thead>
        <tr>
            <th>Nome</th>
            <th>RA</th>
            <th>Código</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    // Função para gerar o código baseado no RA (Lógica Simples)
    function gerarCodigo(ra) {
        return "COD-" + btoa(ra).substring(0, 5).toUpperCase();
    }

    function salvar() {
        const nome = document.getElementById('nome').value;
        const ra = document.getElementById('ra').value;

        if (!nome || !ra) return alert("Preencha tudo!");

        const aluno = { nome, ra, codigo: gerarCodigo(ra) };
        
        // CRUD: Create (Salvar no localStorage)
        let lista = JSON.parse(localStorage.getItem('alunos') || '[]');
        lista.push(aluno);
        localStorage.setItem('alunos', JSON.stringify(lista));

        limparCampos();
        listar();
    }

    function listar() {
        const corpoTabela = document.querySelector('#tabelaAlunos tbody');
        corpoTabela.innerHTML = '';
        const lista = JSON.parse(localStorage.getItem('alunos') || '[]');

        lista.forEach((aluno, index) => {
            corpoTabela.innerHTML += `
                <tr>
                    <td>${aluno.nome}</td>
                    <td>${aluno.ra}</td>
                    <td><strong>${aluno.codigo}</strong></td>
                    <td><button class="btn-del" onclick="excluir(${index})">X</button></td>
                </tr>`;
        });
    }

    function excluir(index) {
        let lista = JSON.parse(localStorage.getItem('alunos'));
        lista.splice(index, 1); // CRUD: Delete
        localStorage.setItem('alunos', JSON.stringify(lista));
        listar();
    }

    function limparCampos() {
        document.getElementById('nome').value = '';
        document.getElementById('ra').value = '';
    }

    // Inicia a lista ao carregar a página
    listar();
</script>

</body>
</html>
